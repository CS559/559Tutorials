{{/* A widget that lists the pages in a section - useful for tutorials */}}
{{- if (not .IsHome) }}
<div class="widget-archive widget">
    {{- $section := .Page.CurrentSection }}
    <h4  class="widget__title">Index: <a href="{{ $section.RelPermalink }}">{{ $section.Title }} </a></h4>

    <div class="widget__content widget__list">
        <ul>
      {{ range $section.Pages }}
            <li><a href="{{ .Permalink }}"> {{ .Title }}</a></li>
      {{ end }}
        </ul>
    </div>
</div>
{{- end }}
